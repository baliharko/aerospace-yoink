name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26'
      - run: swift build
      # swift test requires macOS 26 at runtime (NSGlassEffectView);
      # GitHub Actions does not yet offer a macOS 26 runner.
